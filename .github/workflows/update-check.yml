name: Auto-update Hyperion

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if version already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest stable Hyperion release
        id: hyperion
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/hyperion-project/hyperion.ng/releases/latest)
          VERSION=$(echo "$RELEASE" | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest Hyperion version"
            exit 1
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Hyperion latest stable: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.hyperion.outputs.version }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force rebuild requested"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected: $TAG"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.should_build == 'true'
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.hyperion.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        if: steps.check.outputs.should_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.hyperion.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          TAG="v${VERSION}"
          cat > /tmp/release-notes.md <<EOF
          Automated Docker image rebuild for Hyperion NG **${VERSION}**.

          ### Pull the image

          \`\`\`bash
          docker pull ghcr.io/${REPO}:${VERSION}
          \`\`\`

          ### Upstream

          [Hyperion NG ${VERSION} release notes](https://github.com/hyperion-project/hyperion.ng/releases/tag/${VERSION})
          EOF
          gh release create "${TAG}" \
            --repo "${REPO}" \
            --title "Hyperion ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest
